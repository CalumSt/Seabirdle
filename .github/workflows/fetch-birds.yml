name: Fetch daily bird

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Fetch recording and download audio + image
        env:
          XC_KEY: ${{ secrets.XC_API_KEY }}
        run: python scripts/fetch_bird.py

      - name: Commit assets
        run: |
          git config user.email "seabirdle-bot@users.noreply.github.com"
          git config user.name  "Seabirdle Bot"
          git add birds.json audio/today.* img/daily/today.*
          git diff --staged --quiet && echo "No change" || git commit -m "chore: daily bird $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # ensure we have the latest commit from fetch job

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4