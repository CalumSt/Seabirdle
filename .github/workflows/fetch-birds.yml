# .github/workflows/fetch-birds.yml
name: Fetch daily bird

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC — runs before anyone plays
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write          # needed to push birds.json

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch XC recording
        env:
          XC_KEY: ${{ secrets.XC_API_KEY }}
        run: python scripts/fetch_bird.py

      - name: Commit birds.json
        run: |
          git config user.email "seabirdle-bot@users.noreply.github.com"
          git config user.name  "Seabirdle Bot"
          git add birds.json
          git add audio/today.mp3
          git add audio/today.jpg
          git diff --staged --quiet && echo "No change" || git commit -m "chore: daily bird $(date -u +%Y-%m-%d)"
          git push