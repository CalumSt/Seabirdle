name: Cypress tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: python scripts/update_cypress_fixture.py
      - run: npm ci

      # Serve the site locally, run Cypress against it
      - name: Serve and test
        uses: cypress-io/github-action@v6
        with:
          start: npx serve . -l 5000
          wait-on: 'http://localhost:5000'
          wait-on-timeout: 15
          browser: chrome
          headless: true