name: Cypress tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Update Cypress fixture date
        run: python scripts/update_cypress_fixture.py

      - name: Serve and test
        uses: cypress-io/github-action@v6
        with:
          start: npx serve . -l 5000
          wait-on: 'http://localhost:5000'
          wait-on-timeout: 15
          browser: chrome
          headless: true
          install: false